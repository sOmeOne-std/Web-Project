<!-- Title -->
<div class="container text-center mt-4">
<h1 class="fw-bold">Your opinion is important!!</h1>
</div>

<!-- Form -->
<div class="container mt-4">
<div class="row justify-content-center">
<div class="col-md-6">

<form id="feedbackForm" class="bg-white p-4 rounded shadow">

<!-- Name -->
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" id="name" class="form-control">
<div class="text-danger" id="nameError"></div>
</div>

<!-- Email -->
<div class="mb-3">
<label class="form-label">Email</label>
<input type="text" id="email" class="form-control">
<div class="text-danger" id="emailError"></div>
</div>

<!-- Rating -->
<div class="mb-3">
<label class="form-label">Rate our website</label>
<select class="form-select">
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>
</div>

<!-- Radio -->
<div class="mb-3">
<label class="form-label">Would you recommend us?</label><br>
<input type="radio" name="recommend"> Yes
<input type="radio" name="recommend"> No
</div>

<!-- Checkbox -->
<div class="mb-3">
<label class="form-label">What do you like?</label><br>
<input type="checkbox"> Games
<input type="checkbox"> Prices
<input type="checkbox"> Design
</div>

<!-- Comment -->
<div class="mb-3">
<label class="form-label">Your Comment</label>
<textarea id="comment" class="form-control"></textarea>
<div class="text-danger" id="commentError"></div>
</div>

<!-- Submit -->
<button type="submit" class="btn btn-dark w-100">Send Feedback</button>

</form>

</div>
</div>
</div>

<!-- Footer -->
<footer class="text-center mt-4 p-3 bg-dark text-white">
© 2026 Game Store
</footer>

<!-- JavaScript Validation -->
<script>
document.getElementById("feedbackForm").addEventListener("submit", function(e){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let comment = document.getElementById("comment").value;

let valid = true;

// Name validation (only letters, at least 3 chars)
let namePattern = /^[A-Za-z ]{3,}$/;
if(!namePattern.test(name)){
document.getElementById("nameError").innerText = "Name must be at least 3 letters";
valid = false;
}else{
document.getElementById("nameError").innerText = "";
}

// Email validation (custom regex)
let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
if(!emailPattern.test(email)){
document.getElementById("emailError").innerText = "Enter valid email";
valid = false;
}else{
document.getElementById("emailError").innerText = "";
}

// Comment validation (at least 10 characters)
if(comment.length < 10){
document.getElementById("commentError").innerText = "Comment must be at least 10 characters";
valid = false;
}else{
document.getElementById("commentError").innerText = "";
}

// prevent submit if invalid
if(!valid){
e.preventDefault();
}

});
</script>
