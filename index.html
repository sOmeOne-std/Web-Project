<!-- MOVING BANNER -->
<div class="bg-dark text-white mt-4 py-2 overflow-hidden">
<div id="bannerText" class="d-inline-block px-3"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function updateBanner() {
const now = new Date();
const date = now.toLocaleDateString();
const time = now.toLocaleTimeString();

document.getElementById("bannerText").textContent =
"Welcome to Oman Retro website! Today is " + date + ", and the time is " + time;
}

updateBanner();
setInterval(updateBanner, 1000);

// animation
let position = window.innerWidth;

function moveBanner() {
const banner = document.getElementById("bannerText");

position--;
banner.style.transform = `translateX(${position}px)`;

if (position < -banner.offsetWidth) {
position = window.innerWidth;
}

requestAnimationFrame(moveBanner);
}

moveBanner();
</script>
