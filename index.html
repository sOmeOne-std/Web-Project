<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oman Retro</title>
<style>
body {
margin: 0;
font-family: Georgia, serif;
background-color: #cabebe;
}


.navbar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 30px;
background-color: #5a5246;
}

.logo {
display: flex;
align-items: center;
gap: 10px;
font-size: 22px;
font-weight: bold;
}

.logo img {
width: 40px;
height: 40px;
border-radius: 50%;
}

.nav-links a {
margin-left: 20px;
text-decoration: none;
color: #000000;
font-size: 16px;
}

.nav-links a:hover {
text-decoration: underline;
}



.divider {
border-top: 1px dashed #ccc;
margin: 20px 0;
}


.games {
display: flex;
justify-content: center;
gap: 40px;
padding: 20px;
flex-wrap: wrap;
}

.game-card {
text-align: center;
width: 200px;
}

.game-card img {
width: 100%;
height: 270px;
object-fit: cover;
border: 1px solid #ccc;
}

.game-title {
margin-top: 10px;
font-size: 14px;
font-weight: bold;
}

.condition {
margin-top: 5px;
font-size: 13px;
}

.price {
margin-top: 5px;
font-size: 14px;
font-weight: bold;
}
</style>
</head>
<body>


<div class="navbar">
<div class="logo">
<img src="LOG 3.JPEG" alt="Logo">
      OMAN RETRO
</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Special offers</a>
<a href="#">CART 🛒</a>
<a href="#">About us</a>
<a href="#">Contact us</a>
<a href="#">log in/register</a>
</div>
</div>

<div class="divider"></div>


<div class="games">

<div class="game-card">
<img src="driver.jpg" alt="Game 1">
<div class="game-title">(PS3) DRIVER SAN FRANCISCO</div>
<div class="condition">USED</div>
<div class="price">8 OMR</div>
</div>

<div class="game-card">
<img src="ninja3.jpg" alt="Game 2">
<div class="game-title">(PS3) NINJA GAIDEN 3</div>
<div class="condition">USED</div>
<div class="price">5 OMR</div>
</div>

<div class="game-card">
<img src="mafiatrilogy.jpg" alt="Game 3">
<div class="game-title">(PS4) MAFIA TRILOGY</div>
<div class="condition">NEW</div>
<div class="price">13 OMR</div>
</div>

<div class="game-card">
<img src="lanoire.jpg" alt="Game 4">
<div class="game-title">(PS4) L.A NOIRE</div>
<div class="condition">USED</div>
<div class="price">8 OMR</div>
</div>

</div>

</body>
</html>
