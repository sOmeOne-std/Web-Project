<!DOCTYPE html>
<html>
<head>
    <title>Age Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        function calculateAge() {
            let day = parseInt(document.getElementById("day").value);
            let month = parseInt(document.getElementById("month").value);
            let year = parseInt(document.getElementById("year").value);

            let today = new Date();
            let birth = new Date(year, month - 1, day);

            let ageYears = today.getFullYear() - birth.getFullYear();
            let ageMonths = today.getMonth() - birth.getMonth();
            let ageDays = today.getDate() - birth.getDate();

            if (ageDays < 0) {
                ageMonths--;
                ageDays += 30;
            }

            if (ageMonths < 0) {
                ageYears--;
                ageMonths += 12;
            }

            document.getElementById("result").innerHTML =
                "Age: " + ageYears + " Years, " + ageMonths + " Months, " + ageDays + " Days";
        }
    </script>
</head>

<body class="container mt-5">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <a class="navbar-brand text-white ms-3" href="#">MySite</a>
    <div class="navbar-nav">
        <a class="nav-link text-white" href="login.html">Login</a>
        <a class="nav-link text-white" href="profile.html">Profile</a>
        <a class="nav-link text-white" href="calculation.html">Calculator</a>
    </div>
</nav>

<h2>Age Calculator</h2>

<input type="number" id="day" placeholder="Day" class="form-control mb-2">
<input type="number" id="month" placeholder="Month" class="form-control mb-2">
<input type="number" id="year" placeholder="Year" class="form-control mb-2">

<button onclick="calculateAge()" class="btn btn-success">Calculate</button>

<p id="result" class="mt-3"></p>

</body>
</html>
