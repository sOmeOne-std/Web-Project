<div class="text-center py-5" style="background-color:#5a5246;">
<h1 class="display-4 fw-bold text-dark">Game Purchase Calculator</h1>
<p class="lead text-dark">Calculate your total before checkout 🎮</p>
</div>

<div class="container my-5">
<div class="row justify-content-center">
<div class="col-lg-6">

<form id="calcForm">

<div class="mb-3">
<label class="form-label">Select Game</label>
<select class="form-select" id="game">
<option value="">Choose...</option>
<option value="8">Driver San Francisco (8 OMR)</option>
<option value="5">Ninja Gaiden 3 (5 OMR)</option>
<option value="13">Mafia Trilogy (13 OMR)</option>
<option value="8">L.A Noire (8 OMR)</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Quantity</label>
<input type="number" class="form-control" id="quantity" min="1">
</div>

<div class="mb-3">
<label class="form-label">Your Age</label>
<input type="number" class="form-control" id="age">
</div>

<div class="mb-3 form-check">
<input type="checkbox" class="form-check-input" id="member">
<label class="form-check-label">Loyalty Member (5% discount)</label>
</div>

<button class="btn btn-dark w-100 mb-3" type="submit">Calculate Total</button>

</form>

<div class="alert alert-dark text-center d-none" id="resultBox"></div>

</div>
</div>
</div>

<div class="modal fade" id="resultModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Final Price</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body text-center" id="modalText"></div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/*
This script calculates the total bill based on user input.
It uses:
- multiplication (price × quantity)
- conditionals (if age > 60 → discount)
- logical operators (multiple conditions combined)
*/

document.getElementById("calcForm").addEventListener("submit",function(e){

e.preventDefault();

/* GET VALUES */
let price=parseFloat(document.getElementById("game").value);
let quantity=parseInt(document.getElementById("quantity").value);
let age=parseInt(document.getElementById("age").value);
let member=document.getElementById("member").checked;

/* VALIDATION */
if(!price || !quantity || quantity<=0 || !age){
alert("Please fill all fields correctly.");
return;
}

/* CALCULATION */
let total=price*quantity;

/*
Apply discounts:
1. If age > 60: 10% discount
2. If member: 5% discount
3. If both: both discounts apply
*/

if(age>60){
total=total*0.90;
}

if(member){
total=total*0.95;
}

/* OUTPUT */
let message="Total price: "+total.toFixed(2)+" OMR";

/* SHOW RESULT IN MODAL */
document.getElementById("modalText").textContent=message;
let modal=new bootstrap.Modal(document.getElementById("resultModal"));
modal.show();

});
</script>
