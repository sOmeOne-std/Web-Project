<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function validateForm() {
            let username = document.getElementById("username").value;
            let email = document.getElementById("email").value;
            let confirm = document.getElementById("confirm").value;
            let phone = document.getElementById("phone").value;

            let nameRegex = /^[A-Za-z]+$/;
            let emailRegex = /^s\d{8}@student\.squ\.edu\.om$/;
            let phoneRegex = /^[279]\d{7}$/;

            if (!nameRegex.test(username)) {
                alert("Invalid username – specify your first name");
                return false;
            }

            if (!emailRegex.test(email)) {
                alert("Please enter a valid SQU email address.");
                return false;
            }

            if (email !== confirm) {
                alert("Passwords do not match!");
                return false;
            }

            if (!phoneRegex.test(phone)) {
                alert("Invalid phone number!");
                return false;
            }

            alert("Login Successful!");
            return true;
        }
    </script>
</head>

<body class="container mt-5">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <a class="navbar-brand text-white ms-3" href="#">MySite</a>
    <div class="navbar-nav">
        <a class="nav-link text-white" href="login.html">Login</a>
        <a class="nav-link text-white" href="profile.html">Profile</a>
        <a class="nav-link text-white" href="calculation.html">Calculator</a>
    </div>
</nav>

<h2>Login Form</h2>

<form onsubmit="return validateForm()">
    <div class="mb-3">
        <label>Username</label>
        <input type="text" id="username" class="form-control">
    </div>

    <div class="mb-3">
        <label>Email (Password)</label>
        <input type="text" id="email" class="form-control">
    </div>

    <div class="mb-3">
        <label>Confirm Email</label>
        <input type="text" id="confirm" class="form-control">
    </div>

    <div class="mb-3">
        <label>Phone</label>
        <input type="text" id="phone" class="form-control">
    </div>

    <button class="btn btn-primary">Submit</button>
</form>

</body>
</html>
